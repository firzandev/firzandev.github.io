<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firzan Landing Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            text-align:center;
            background:rgba(255,255,255,.08);
            padding:50px;
            border-radius:20px;
            backdrop-filter:blur(10px);
            box-shadow:0 20px 50px rgba(0,0,0,.3);
            max-width:600px;
        }

        h1{
            font-size:48px;
            margin-bottom:15px;
        }

        p{
            color:#ddd;
            margin-bottom:30px;
            line-height:1.6;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            background:#3b82f6;
            color:white;
            padding:15px 30px;
            border-radius:10px;
            transition:.3s;
        }

        .btn:hover{
            background:#2563eb;
            transform:translateY(-3px);
        }

        footer{
            margin-top:40px;
            font-size:13px;
            color:#aaa;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 GitHub Pages</h1>

    <p>
        Selamat! Landing Page Anda berhasil berjalan di GitHub Pages.
    </p>

    <a class="btn" href="https://github.com" target="_blank">
        Visit GitHub
    </a>

    <footer>
        © 2026 Firzan
    </footer>
</div>

</body>
</html>
